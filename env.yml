# environment-dev.yml
#
# Conda environment for developing the cyclops package.
# This version is configured to force the use of CUDA-enabled OpenMM.
#
name: cyclops


channels:
  - conda-forge  # <-- The ONLY channel

dependencies:
  # --- Base Environment ---
  - python=3.12
  - pip

  # --- CUDA-enabled OpenMM ---
  - openmm
  - cudatoolkit

  # --- Core Runtime Dependencies ---
  - openff-toolkit
  - openff-interchange
  - openff-nagl
  - mdtraj
  - numpy
  - rdkit
  - pdbfixer
  - openbabel
  - openmmforcefields
  - biopython
  - pandas
  - matplotlib
  - requests
  # --- PTM Prototype Dependencies ---
  - pyxdg
  - rustworkx
  - gemmi
  - openff-nagl-models
  - openff-forcefields>=2025.10.1
  - pytorch-cpu>=2.6

  # --- Pip Dependencies ---
  - pip:
    - git+https://github.com/openforcefield/openff-pablo.git@v0.2.0
      plip
